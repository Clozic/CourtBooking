name: Check Tennis Court Availability

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run availability check
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TARGET_DATE: ${{ vars.TARGET_DATE }}
          TARGET_TIMES: ${{ vars.TARGET_TIMES }}
          TARGET_START_HOUR: ${{ vars.TARGET_START_HOUR }}
          TARGET_END_HOUR: ${{ vars.TARGET_END_HOUR }}
        run: python check_tennis.py || true
